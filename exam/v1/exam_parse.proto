syntax = "proto3";

package exam.v1;

option go_package = "k12_backend/api/exam/v1;v1";

service ExamParserService {
  // Create a new task to parse an exam document. Returns the task ID.
  rpc CreateTask(CreateTaskRequest) returns (CreateTaskResponse);

  // Query the status of a specific task
  rpc GetTaskStatus(GetTaskStatusRequest) returns (GetTaskStatusResponse);

  // Stream the progress of a task. The server will close the stream when the task completes or fails.
  rpc StreamTaskProgress(StreamTaskProgressRequest) returns (stream TaskProgressMessage);
}

message CreateTaskRequest {
  string file_name = 1;      // Name of the file, e.g. "exam.pdf" or "exam.docx"
  int32 max_pages = 2;       // Max pages to process (0 = all)

  oneof source {
    // MinIO 地址或任意可下载 URL；提供后服务端不会上传，直接按该地址拉取
    string file_url = 3;     // e.g. minio://bucket/key, https://minio.example.com/bucket/key, 或 OSS/HTTP URL
    bytes file_content = 4;  // 直接上传文件内容；服务端会写入 MinIO（或落盘 temp）
    string file_path = 5;    // 本地文件路径（仅测试/本机访问）
  }

  // Optional exam metadata (subject, grade, exam type). If not set, LLM will infer.
  string subject = 6;        // e.g. 语文, 数学, 英文, 物理, 化学
  string grade_level = 7;    // e.g. 初中, 高中 or 初一, 初二, 高一
  string exam_type = 8;      // e.g. 期中, 期末, 模拟, 月考
}

message CreateTaskResponse {
  string task_id = 1;
  string message = 2;
}

message GetTaskStatusRequest {
  string task_id = 1;
}

message GetTaskStatusResponse {
  string task_id = 1;
  string status = 2;         // PENDING, PROCESSING, COMPLETED, FAILED
  string error_message = 3;
  string result_path = 4;    // Path to the parsed JSON
  int32 total_pages = 5;
  int32 processed_pages = 6;
  string created_at = 7;
  string updated_at = 8;
  float progress_percent = 9;
  string parsed_result_json = 10; // Contains the full JSON payload if COMPLETED
  string exam_meta_json = 11;     // Structured exam labels (subject, grade_level, grade_detail, exam_type)
}

message StreamTaskProgressRequest {
  string task_id = 1;
}

message TaskProgressMessage {
  string task_id = 1;
  string status = 2;
  float progress_percent = 3;
  string detail = 4; // e.g., "Extracted page 3/10" or "Stage 2 complete"
  int32 processed_pages = 5;
  int32 total_pages = 6;
}
